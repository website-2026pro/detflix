<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DETFLIX - Channels</title>
    <style>
        /* ===== ANIMATIONS ===== */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 10px rgba(255, 68, 138, 0.5), 0 0 20px rgba(52, 150, 255, 0.3);
            }
            50% {
                text-shadow: 0 0 20px rgba(255, 68, 138, 0.8), 0 0 40px rgba(52, 150, 255, 0.6);
            }
        }

        @keyframes buttonGlow {
            0%, 100% {
                box-shadow: 0 0 5px rgba(0, 123, 255, 0.5), inset 0 0 5px rgba(0, 123, 255, 0.2);
            }
            50% {
                box-shadow: 0 0 20px rgba(0, 123, 255, 0.8), inset 0 0 10px rgba(0, 123, 255, 0.4);
            }
        }

        @keyframes buttonPulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
            }
        }

        @keyframes slideInLeft {
            from {
                opacity: 0;
                transform: translateX(-50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideInRight {
            from {
                opacity: 0;
                transform: translateX(50px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes shimmer {
            0% {
                background-position: -1000px 0;
            }
            100% {
                background-position: 1000px 0;
            }
        }

        /* ===== GLOBAL STYLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #ffffff;
            padding: 30px 20px;
            text-align: center;
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(0, 123, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 68, 138, 0.1) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        h1 {
            color: #ff4567;
            font-size: 3.5rem;
            margin-bottom: 10px;
            animation: fadeInDown 0.8s ease, glow 3s ease-in-out infinite;
            letter-spacing: 3px;
            font-weight: bold;
        }

        p {
            color: #b0b0c0;
            font-size: 1.1rem;
            margin-bottom: 40px;
            animation: fadeInUp 0.8s ease 0.2s both;
            letter-spacing: 2px;
        }

        h3 {
            color: #00d4ff;
            font-size: 1.8rem;
            margin-top: 50px;
            margin-bottom: 25px;
            animation: fadeInUp 0.8s ease both;
            letter-spacing: 2px;
        }

        /* ===== BUTTON STYLES ===== */
        .buttons-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
            animation: fadeInUp 0.8s ease 0.3s both;
        }

        .link-button {
            display: inline-block;
            padding: 14px 28px;
            background: linear-gradient(135deg, #007BFF 0%, #0056b3 100%);
            color: white;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 8px 15px rgba(0, 123, 255, 0.2);
        }

        /* Button hover effect - Glow */
        .link-button:hover {
            animation: buttonGlow 1.5s ease infinite;
            transform: translateY(-3px);
            box-shadow: 0 12px 25px rgba(0, 123, 255, 0.4);
            border-color: #00d4ff;
        }

        /* Button shimmer effect on hover */
        .link-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.5s ease;
            z-index: 1;
        }

        .link-button:hover::before {
            left: 100%;
        }

        .link-button span {
            position: relative;
            z-index: 2;
            display: inline-block;
        }

        .link-button:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3);
        }

        /* ===== CATEGORY BUTTONS ===== */
        .category-section {
            animation: fadeInUp 0.8s ease both;
        }

        /* Stagger animation for button lists */
        .link-button:nth-child(1) { animation: slideInLeft 0.6s ease 0.1s both; }
        .link-button:nth-child(2) { animation: slideInLeft 0.6s ease 0.2s both; }
        .link-button:nth-child(3) { animation: slideInLeft 0.6s ease 0.3s both; }
        .link-button:nth-child(4) { animation: slideInRight 0.6s ease 0.1s both; }
        .link-button:nth-child(5) { animation: slideInRight 0.6s ease 0.2s both; }
        .link-button:nth-child(6) { animation: slideInRight 0.6s ease 0.3s both; }
        .link-button:nth-child(7) { animation: slideInLeft 0.6s ease 0.4s both; }
        .link-button:nth-child(8) { animation: slideInRight 0.6s ease 0.4s both; }
        .link-button:nth-child(9) { animation: slideInLeft 0.6s ease 0.5s both; }
        .link-button:nth-child(10) { animation: slideInRight 0.6s ease 0.5s both; }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.5rem;
            }

            p {
                font-size: 1rem;
            }

            h3 {
                font-size: 1.5rem;
            }

            .link-button {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
