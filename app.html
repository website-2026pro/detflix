<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #06030f;
            color: #f0e9e9;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background-image: radial-gradient(circle at top left, rgba(0, 95, 153, 0.25), transparent 28%),
                              radial-gradient(circle at bottom right, rgba(255, 255, 255, 0.08), transparent 30%);
            overflow-x: hidden;
        }

        .page-wrap {
            width: min(120%, 2590px);
            text-align: center;
        }

        header {
            margin-bottom: 28px;
            opacity: 0;
            animation: headerFade 1s ease-out forwards;
        }

        header h1 {
            margin: 0;
            font-size: clamp(2.2rem, 4vw, 3.6rem);
            letter-spacing: 0.16em;
            text-transform: uppercase;
            line-height: 1.05;
            color: #fff;
            text-shadow: 0 0 20px rgba(36, 144, 255, 0.6), 0 0 40px rgba(0, 95, 153, 0.4);
            animation: titleGlow 2.5s ease-in-out forwards, titlePulse 3s ease-in-out 0.4s infinite;
            opacity: 0;
        }

        header p {
            margin: 14px auto 0;
            max-width: 760px;
            font-size: 1rem;
            color: #d7d1d1;
        }

        .card {
            position: relative;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 26px;
            align-items: center;
            padding: 28px;
            border-radius: 28px;
            background: rgba(14, 10, 31, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 40px 95px rgba(0, 0, 0, 0.45);
            overflow: hidden;
            animation: cardFadeIn 1s ease-out forwards;
            transform: translateY(24px);
            opacity: 0;
        }

        .movie-card {
            display: grid;
            gap: 18px;
            justify-items: center;
        }

        .poster-frame {
            width: 100%;
            max-width: 320px;
            aspect-ratio: 3 / 4;
            position: relative;
            border-radius: 26px;
            overflow: hidden;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
            animation: posterDrift 6s ease-in-out infinite alternate;
        }

        .poster-frame::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 0, 0, 0.45) 85%);
            pointer-events: none;
        }

        .poster-frame::after {
            content: "";
            position: absolute;
            inset: -20px;
            background: radial-gradient(circle at 30% 20%, rgba(36, 144, 255, 0.22), transparent 28%),
                        radial-gradient(circle at 70% 80%, rgba(255, 96, 189, 0.18), transparent 20%);
            filter: blur(25px);
            opacity: 0.85;
            pointer-events: none;
        }

        .poster-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .movie-details {
            text-align: left;
            min-width: 0;
        }

        .movie-details .genre {
            display: inline-block;
            margin-bottom: 14px;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: #9bdcff;
            font-size: 0.92rem;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }

        .movie-details h2 {
            margin: 0 0 14px;
            font-size: clamp(2rem, 3.5vw, 2.8rem);
            line-height: 1.05;
            color: #fff;
        }

        .movie-details p {
            margin: 0;
            color: #d7d1d1;
            line-height: 1.9;
            font-size: 1rem;
        }

        .telegram-link {
            margin-top: 28px;
            animation: CTAFloat 1.6s ease-in-out infinite alternate;
        }

        .telegram-link a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 34px;
            background: linear-gradient(135deg, #0c4d82, #1a2b54 65%);
            color: #fff;
            text-decoration: none;
            border-radius: 999px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.22s ease, box-shadow 0.22s ease, background 0.22s ease;
            box-shadow: 0 18px 40px rgba(0, 96, 157, 0.2);
        }

        .telegram-link a:hover {
            transform: translateY(-3px) scale(1.01);
            background: linear-gradient(135deg, #0580e2, #16416f 65%);
            box-shadow: 0 24px 48px rgba(0, 96, 157, 0.28);
        }

        @media (max-width: 820px) {
            .card {
                grid-template-columns: 1fr;
                padding: 24px;
            }

            .movie-details {
                text-align: center;
            }

            .movie-details h2 {
                font-size: 2.4rem;
            }
        }

        @keyframes headerFade {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes cardFadeIn {
            from { opacity: 0; transform: translateY(28px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes posterDrift {
            from { transform: translateY(0) rotate(-0.6deg); }
            to { transform: translateY(-10px) rotate(0.6deg); }
        }

        @keyframes CTAFloat {
            from { transform: translateY(0); }
            to { transform: translateY(-8px); }
        }

        @keyframes titleGlow {
            from { 
                opacity: 0; 
                transform: scale(0.8);
                text-shadow: 0 0 10px rgba(36, 144, 255, 0.2);
            }
            to { 
                opacity: 1; 
                transform: scale(1);
                text-shadow: 0 0 20px rgba(36, 144, 255, 0.6), 0 0 40px rgba(0, 95, 153, 0.4);
            }
        }

        @keyframes titlePulse {
            0%, 100% { 
                text-shadow: 0 0 20px rgba(36, 144, 255, 0.6), 0 0 40px rgba(0, 95, 153, 0.4);
            }
            50% { 
                text-shadow: 0 0 30px rgba(36, 144, 255, 0.9), 0 0 60px rgba(0, 95, 153, 0.6), 0 0 90px rgba(255, 96, 189, 0.3);
            }
        }
    </style>
</head>
